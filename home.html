<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <div class="left">

      <div class="logo">
        <img src="assets/logo.png">
      </div>

      <select class="dropdown">
        <option>Class 1</option>
      </select>

    </div>

    <div class="profile">
    <img src="assets/profile.png">
    <span>Alex Borstein</span>
    </div>

  </div>

  <!-- MAIN LAYOUT -->
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="active">Home</button> <!-- Someone add the icons logos here, make sure to remove the background-->
      <button>Chatbot</button>
      <button>Resources</button>
      <button>Settings</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <div class="cards">
        <div class="card">Progress (98%)</div>
        <div class="card">Stats</div>
        <div class="card">Topics</div>
      </div>

      <div class="large-card">Graph Area</div>

      <div class="bottom-section">
        <div class="notes">Notes Area</div>
        <div class="assignment">Assignment</div>
      </div>

    </div>

  </div>

</body>
</html>
