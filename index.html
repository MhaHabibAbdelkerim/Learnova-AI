<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <div class="left">

      <div class="logo">
        <img src="assets/logo.png" alt="Logo">
      </div>

      <select class="dropdown">
        <option>Class 1</option>
      </select>

    </div>

    <div class="profile">
      <img src="assets/profile.png" alt="Profile">
      <span>Alex Borstein</span>
    </div>

  </div>

  <!-- MAIN LAYOUT -->
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <a href="index.html" class="active">🏠 Home</a> <!-- Abdelkerim add the logs here, make sure no background of logos-->
      <a href="chatbot.html">💬 Chatbot</a>
      <a href="resources.html">📚 Resources</a>
      <a href="settings.html">⚙️ Settings</a>

    </div>

    <!-- CONTENT -->
    <div class="content">

      <div class="cards">
        <div class="card">Progress (98%)</div>
        <div class="card">Stats</div>
        <div class="card">Topics</div>
      </div>

      <div class="large-card">Graph Area</div>

      <div class="bottom-section">
        <div class="notes">Notes Area</div>
        <div class="assignment">Assignment</div>
      </div>

    </div>

  </div>

</body>
</html>
